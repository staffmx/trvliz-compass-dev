<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traveliz Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts Configuration -->
    <style>
      /* Aileron Fonts */
      @font-face {
        font-family: 'Aileron';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/Aileron-Regular.woff') format('woff'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/Aileron-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Aileron';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/Aileron-Bold.woff') format('woff'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/Aileron-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
      }

      /* Nyght Serif Fonts */
      
      /* Light (300) */
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Light.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Light.woff') format('woff');
        font-weight: 300;
        font-style: normal;
      }
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-LightItalic.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-LightItalic.woff') format('woff');
        font-weight: 300;
        font-style: italic;
      }

      /* Regular (400) */
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Regular-1.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Regular-1.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-RegularItalic-1.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-RegularItalic-1.woff') format('woff');
        font-weight: 400;
        font-style: italic;
      }

      /* Medium (500) */
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Medium-1.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Medium-1.woff') format('woff');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-MediumItalic.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-MediumItalic.woff') format('woff');
        font-weight: 500;
        font-style: italic;
      }

      /* Bold (700) */
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Bold.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-BoldItalic.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-BoldItalic.woff') format('woff');
        font-weight: 700;
        font-style: italic;
      }

      /* Dark (900) */
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Dark.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-Dark.woff') format('woff');
        font-weight: 900;
        font-style: normal;
      }
      @font-face {
        font-family: 'Nyght Serif';
        src: url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-DarkItalic.woff2') format('woff2'),
             url('https://traveliz.com/new-2025/wp-content/uploads/2025/09/NyghtSerif-DarkItalic.woff') format('woff');
        font-weight: 900;
        font-style: italic;
      }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            maxWidth: {
              'site': '1440px', // New Layout Max Width
            },
            spacing: {
              'section-y': '60px', // Reduced from 120px to 60px
              'section-y-lg': '160px', // Large Section Padding
              'mobile-x': '24px', // Standard Mobile Horizontal Padding
              'grid-gap': '40px', // Standard Grid Gap
            },
            fontFamily: {
              sans: ['Aileron', 'sans-serif'], // Weights: 400, 700 available
              serif: ['"Nyght Serif"', 'serif'], // Weights: 300, 400, 500, 700, 900 available
            },
            colors: {
              // New Traveliz System
              primary: '#222222',     // Traveliz Black (Main Text)
              brand: '#002E60',       // Traveliz Blue (Authority - Headers, Buttons, Links)
              secondary: '#999999',   // Muted Text (Metadata)
              accent: '#D4AF37',      // Traveliz Gold (UX Interaction Only)
              background: '#F5F6F8',  // Traveliz White (Page Background)
              surface: '#FFFFFF',     // Pure White (Cards against the F5F6F8 bg)
              neutral: '#E8E6E6',     // Traveliz Grey (Secondary BGs, Separators)
              
              // Keeping traveliz object for backward compat but mapping to new palette
              traveliz: {
                50: '#F5F6F8',
                100: '#E8E6E6',
                200: '#D1D5DB',
                500: '#D4AF37', // Gold
                600: '#002E60', // Blue
                800: '#222222', // Black
                900: '#001A36', // Darker Blue
              }
            },
            letterSpacing: {
              widest: '2px', // Specific for Accent Text
            },
            borderRadius: {
              luxury: '4px', // Slightly softer corners for modern feel
            }
          }
        }
      }
    </script>
    <style>
      /* Global Site Settings */
      html {
        scroll-behavior: smooth;
      }
      
      body {
        background-color: #F5F6F8; /* Traveliz White */
        color: #222222; /* Traveliz Black */
      }

      /* Elegant Text Selection - Gold for interaction */
      ::selection {
        background: #D4AF37; /* Traveliz Gold */
        color: #FFFFFF;
      }
      
      /* Sophisticated Hover Effect for Images */
      .luxury-image-hover {
        overflow: hidden;
        transition: all 0.5s ease;
      }
      
      .luxury-image-hover img {
        transition: transform 0.8s ease;
      }
      
      .luxury-image-hover:hover img {
        transform: scale(1.05); /* Zoom very slow and subtle */
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* Utility for specific luxury line-height */
      .leading-luxury {
        line-height: 1.8em;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body class="bg-background text-primary antialiased">
    <div id="root"></div>
  </body>
</html>

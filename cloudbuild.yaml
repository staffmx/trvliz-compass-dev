steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/traveliz-compass:$_ENV_NAME'
      - '.'

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/traveliz-compass:$_ENV_NAME']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'traveliz-compass-$_ENV_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/traveliz-compass:$_ENV_NAME'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/traveliz-compass:$_ENV_NAME'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _ENV_NAME: dev
  _VITE_SUPABASE_URL: ""
  _VITE_SUPABASE_ANON_KEY: ""
